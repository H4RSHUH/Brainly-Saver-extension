<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: sans-serif;
      padding: 12px;
      width: 260px;
      background: #f8fafc;
    }

    h3 {
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .primary {
      background: #6366f1;
      color: white;
    }

    .secondary {
      background: #e5e7eb;
    }

    .warning {
      font-size: 12px;
      color: #ef4444;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div id="loginSection">
    <h3>Login</h3>
    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button class="primary" id="loginBtn">Login</button>
  </div>

  <!-- APP -->
  <div id="appSection" style="display:none;">
    <h3>Save Content</h3>

    <input id="noteTitle" placeholder="Enter title..." style="display:none;" />
    <button class="primary" id="saveBtn">Save</button>
    <button class="secondary" id="logoutBtn">Logout</button>

    <div id="warning" class="warning"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
